<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Make Money</h1>
    <h2 id="moneyH2">0</h2>
    <button id="addMoney" onclick="addValue()">+ 1000 B</button>
    <script>
      let money = 0;
      function addValue() {
        money += 1000;
        document.getElementById("moneyH2").innerText = money;

        if (money > 10000) {
          document.getElementById("moneyH2").style.color = "red";
        }
      }
    </script>
  </body>
</html>

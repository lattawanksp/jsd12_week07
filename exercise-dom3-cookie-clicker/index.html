<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--CSS-->

    <style>
      h1 {
        color: #ff8119;
        font-weight: bold;
      }

      body {
        font-family: sans-serif;
        text-align: center;
        padding: 2rem;
        background: #fff8f0;
      }

      #catBtn {
        font-size: 15rem;
        background: none;
        border: none;
        cursor: pointer;
        transition: transform 0.1s;
      }

      #catBtn:active {
        transform: scale(0.9);
      }

      #scoreShow {
        font-size: 3rem;
      }

      #shop {
        border: 2px solid #ff8119;
        background-color: white;
        width: 300px;
        box-sizing: border-box;
        gap: 10px;
        margin: 20px auto;
      }
    </style>

    <title>Cat Clicker</title>
  </head>

  <body>
    <!--HTML-->
    <div id="catContainer">
      <h1>Cat Clicker</h1>
      <p id="scoreShow">Meow: <span id="score">0</span></p>
      <p id="perSecShow">Per second: <span id="cps">0</span></p>
      <button id="catBtn">😺</button>
    </div>

    <h2>Upgrade Shop</h2>
    <div id="shop">
      <div id="buyFcatBox">
        <p>😽 เรียกเพื่อนแมวส้ม</p>
        <button id="buyFcatBtn" disabled>
          20 Meow <small> (+1/sec)</small>
        </button>
        <p>owned: <span id="CountFcat">0</span></p>
      </div>
    </div>

    <!--JS-->
    <script>
      let score = 0;
      let Fcat = 0;
      const Fcat_Cost = 20;
      const Fcat_CPS = 1;

      const catBtn = document.getElementById("catBtn");
      const scoreDisplay = document.getElementById("score");
      const cpsDisplay = document.getElementById("cps");
      const buyBtn = document.getElementById("buyFcatBtn");
      const countFcatDisplay = document.getElementById("CountFcat");

      function updateUI() {
        scoreDisplay.textContent = Math.floor(score);
        cpsDisplay.textContent = Fcat * Fcat_CPS;
        countFcatDisplay.textContent = Fcat;

        // ปลดล็อคปุ่มถ้าคะแนนพอ
        buyBtn.disabled = score < Fcat_Cost;
      }

      // อัปเดต UI ทุกครั้งที่ score เปลี่ยน
      function oneClick() {
        score += 1;
        updateUI();
      }

      function buyFcatUpgrade() {
        if (score >= Fcat_Cost) {
          score -= Fcat_Cost;
          Fcat += 1;
          updateUI();
        }
      }

      // Auto clicker
      setInterval(function () {
        score += Fcat * Fcat_CPS;
        updateUI();
      }, 1000);

      catBtn.addEventListener("click", oneClick);
      buyBtn.addEventListener("click", buyFcatUpgrade);
    </script>
  </body>
</html>

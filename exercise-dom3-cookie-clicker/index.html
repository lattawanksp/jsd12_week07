<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--CSS-->

    <style>
      h1 {
        color: #ff8119;
        font-weight: bold;
      }

      body {
        font-family: sans-serif;
        text-align: center;
        padding: 2rem;
        background: #fff8f0;
      }

      #catBtn {
        font-size: 15rem;
        background: none;
        border: none;
        cursor: pointer;
        transition: transform 0.1s;
      }

      #catBtn:active {
        transform: scale(0.9);
      }

      #scoreShow {
        font-size: 3rem;
      }

      .shop-item {
        border: 2px solid #ff8119;
        background-color: white;
        width: 300px;
        box-sizing: border-box;
        padding: 15px;
        margin: 20px auto;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #crownIcon {
        margin-bottom: -100px;
        margin-top: 10px;
        font-size: 8rem;
      }
    </style>

    <title>Cat Clicker</title>
  </head>

  <body>
    <!--HTML-->
    <div id="catContainer">
      <h1>Cat Clicker</h1>
      <h2>Chanom แมวส้มที่กำลังสะสมลูกน้องแมวเพื่อเตรียมครองโลก</h2>
      <p id="scoreShow">Meow : <span id="score">0</span></p>
      <p id="perSecShow">Per second: <span id="cps">0</span></p>

      <div id="catArea" style="position: relative">
        <h2 id="crownIcon" style="display: none">👑</h2>
        <button id="catBtn">😺</button>
        <h1 id="catTitle">แมวส้ม</h1>
      </div>
    </div>

    <hr />
    <h2>เพิ่มลูกน้องแมว</h2>
    <div class="shop-item">
      <p>เรียกลูกน้อง 1 แมว</p>
      <button id="buyFcatBtn" disabled>20 Meow (Auto +1 / sec)</button>
      <p>owned: <span id="CountFcat">0</span></p>
    </div>

    <h2>Level Up แมว</h2>
    <div class="shop-item">
      <p>อัพเกรดเป็น King Cat</p>
      <button id="buyCrownBtn" disabled>500 Meow (Click +10)</button>
    </div>

    <!--JS-->
    <script>
      let score = 0;
      let Fcat = 0;
      const Fcat_Cost = 20;
      const Fcat_CPS = 1;
      const Crown_Cost = 500;
      let crownBought = false;
      let clickPower = 1; //อัพเกรดซื้อมง
      let multiplier = 1; //เอามารับตัวแปรที่คูณตอนเลเวลอัพ

      const catBtn = document.getElementById("catBtn");
      const scoreDisplay = document.getElementById("score");
      const cpsDisplay = document.getElementById("cps");
      const buyBtn = document.getElementById("buyFcatBtn");
      const countFcatDisplay = document.getElementById("CountFcat");
      //อัพเกรดซื้อมงกุฏ
      const buyCrownBtn = document.getElementById("buyCrownBtn");

      function updateUI() {
        scoreDisplay.textContent = Math.floor(score);
        cpsDisplay.textContent = Fcat * Fcat_CPS * multiplier;
        countFcatDisplay.textContent = Fcat;

        // ปลดล็อคปุ่มถ้าคะแนนพอ
        buyBtn.disabled = score < Fcat_Cost;
        // ปุ่ม crown: ปลดล็อคเมื่อมีคะแนนพอ และยังไม่เคยซื้อ
        buyCrownBtn.disabled = score < Crown_Cost;
      }

      // อัปเดต UI ทุกครั้งที่ score เปลี่ยน
      function oneClick() {
        score += 1 * clickPower;
        updateUI();
      }

      function buyFcatUpgrade() {
        if (score >= Fcat_Cost) {
          score -= Fcat_Cost;
          Fcat += 1;

          if (!crownBought) {
            // ให้มีผลตอนที่ยังไม่ได้ซื้อมง
            if (Fcat >= 50) {
              document.getElementById("catTitle").textContent =
                "แมวส้มจ่าฝูง 🌟";
            } else if (Fcat >= 30) {
              document.getElementById("catTitle").textContent =
                "แมวส้มผู้นำหมู่บ้าน ⭐️";
            } else if (Fcat >= 10) {
              document.getElementById("catTitle").textContent =
                "แมวส้มผู้นำซอย 🚩";
            }
          }

          randomCatCrews();

          updateUI();
        }
      }

      function buyCrownUpgrade() {
        if (!crownBought && score >= Crown_Cost) {
          score -= Crown_Cost;
          crownBought = true;
          clickPower = 10;

          document.getElementById("crownIcon").style.display = "block";
          document.getElementById("catTitle").textContent =
            "👑 The King of แมวส้ม ! 👑";
          document.getElementById("catTitle").style.color = "#d4af37";
          document.getElementById("catBtn").textContent = "😼";

          buyCrownBtn.textContent = "👑 Upgraded!";
          updateUI();
        }
      }

      //////////////เอาไว้แรนด้อมตำแหน่งแมวบนหน้าจอ

      const catCrews = ["😸", "😹", "😻", "😽", "🙀", "😿", "😾"];

      function randomCatCrews() {
        const area = document.getElementById("catArea");
        const newCat = document.createElement("span");

        const randomIcon =
          catCrews[Math.floor(Math.random() * catCrews.length)];
        newCat.textContent = randomIcon;

        newCat.style.position = "absolute";
        newCat.style.fontSize = "2rem";
        const randomX = Math.floor(Math.random() * 90);
        const randomY = Math.floor(Math.random() * 90);
        newCat.style.left = randomX + "%";
        newCat.style.top = randomY + "%";

        area.appendChild(newCat);
      }
      ///////////////////////////////////////

      // Auto clicker
      setInterval(function () {
        score += Fcat * Fcat_CPS;
        updateUI();
      }, 1000);

      catBtn.addEventListener("click", oneClick);
      buyBtn.addEventListener("click", buyFcatUpgrade);
      buyCrownBtn.addEventListener("click", buyCrownUpgrade);
    </script>
  </body>
</html>
